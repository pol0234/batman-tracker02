<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batman Reading Progression</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background-color: #0f172a; /* Slate 900 */
            color: #f8fafc; /* Slate 50 */
        }
        .completed-card {
            opacity: 0.6;
            border-color: #22c55e; /* Green 500 */
            background-color: #064e3b; /* Emerald 900 */
        }
        .completed-text {
            text-decoration: line-through;
            color: #94a3b8; /* Slate 400 */
        }
        /* Custom scrollbar for a darker theme */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a; 
        }
        ::-webkit-scrollbar-thumb {
            background: #334155; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #475569; 
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 font-sans selection:bg-yellow-500 selection:text-slate-900">

    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <header class="mb-10 text-center md:text-left flex flex-col md:flex-row items-center justify-between gap-4">
            <div>
                <h1 class="text-4xl font-extrabold tracking-tight text-yellow-500 flex items-center gap-3 justify-center md:justify-start">
                    <i data-lucide="bat" class="w-10 h-10"></i>
                    Cesta Temného Rytiera
                </h1>
                <p class="text-slate-400 mt-2 text-lg">Databáza postupu bez spoilerov na základe odporúčaní.</p>
            </div>
            <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 text-center min-w-[150px]">
                <p class="text-sm text-slate-400 font-semibold uppercase tracking-wider">Postup</p>
                <p class="text-3xl font-bold text-yellow-500"><span id="progress-count">0</span> / <span id="total-count">0</span></p>
            </div>
        </header>

        <!-- Legend -->
        <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 mb-8 flex flex-wrap gap-4 items-center text-sm justify-center md:justify-start">
            <span class="font-bold text-slate-300 mr-2">Legenda:</span>
            <span class="px-2 py-1 rounded bg-yellow-500/20 text-yellow-400 border border-yellow-500/30">Kánon</span>
            <span class="px-2 py-1 rounded bg-red-500/20 text-red-400 border border-red-500/30">Mimo Kánon</span>
            <span class="px-2 py-1 rounded bg-blue-500/20 text-blue-400 border border-blue-500/30">Animované / Film</span>
            <span class="px-2 py-1 rounded bg-slate-700 text-slate-300 border border-slate-600 ml-auto">Nutnosť prečítať</span>
        </div>

        <!-- Main Content Container -->
        <div id="timeline-container">
            <!-- Content will be generated by JavaScript -->
        </div>
        
    </div>

    <script>
        // Data Structure based on the provided text (Spoiler-free descriptions)
        const database = [
            {
                phase: "Phase 1: The Early Years",
                items: [
                    { id: "man-who-laughs", title: "The Man Who Laughs", priority: "Must-Read", universe: "Canon", desc: "An essential early story focusing on a crucial first encounter." },
                    { id: "long-halloween", title: "The Long Halloween", priority: "Must-Read", universe: "Canon", desc: "A masterful detective storyline over the course of a year." },
                    { id: "dark-victory", title: "Dark Victory", priority: "Must-Read", universe: "Canon", desc: "A direct follow-up to The Long Halloween." },
                    { id: "monster-men", title: "Monster Men / Mad Monk", priority: "Optional", universe: "Canon", desc: "A really good intro for Batman's early solo career, but not strictly necessary for the larger narrative." }
                ]
            },
            {
                phase: "Phase 2: The Extended Family",
                items: [
                    { id: "robin-batgirl", title: "Robin/Batgirl: Year One", priority: "Must-Read", universe: "Canon", desc: "The foundational origins of Batman's first sidekicks." },
                    { id: "tas", title: "Batman: The Animated Series", priority: "Highly Recommended", universe: "Animated", desc: "Perfect for introducing iconic villains (and Harley Quinn's debut!) without reading decades of comics. Ra's Al Ghul is especially well done here." },
                    { id: "nightwing-yr1", title: "Nightwing: Year One", priority: "Recommended", universe: "Canon", desc: "Showcases Dick Grayson's evolution into his new persona and the introduction of Jason Todd." }
                ]
            },
            {
                phase: "Phase 3: Tragedy & Rebirth",
                items: [
                    { id: "killing-joke", title: "The Killing Joke", priority: "Unskippable", universe: "Canon", desc: "A psychological and dark Joker story with massive, permanent consequences for Barbara Gordon." },
                    { id: "oracle", title: "Batman Chronicles #5 (Oracle: Year One)", priority: "Recommended", universe: "Canon", desc: "Highly recommended to see Barbara Gordon's resilience and path after the events of The Killing Joke." },
                    { id: "death-in-family", title: "A Death in the Family", priority: "Unskippable", universe: "Canon", desc: "A critical turning point and highly consequential storyline involving Jason Todd." },
                    { id: "lonely-place", title: "A Lonely Place of Dying", priority: "Unskippable", universe: "Canon", desc: "Directly addresses the fallout of previous events and introduces the origin story of Tim Drake." },
                    { id: "robin-reborn", title: "Robin: A Hero Reborn", priority: "Recommended", universe: "Canon", desc: "Follows Tim Drake's ongoing journey." }
                ]
            },
            {
                phase: "Phase 4: The 90s Blockbusters & Modern Epics",
                items: [
                    { id: "azrael", title: "Sword of Azrael", priority: "Canon", universe: "Canon", desc: "Introduces Azrael into the mythology." },
                    { id: "knightfall", title: "Knightfall", priority: "Canon", universe: "Canon", desc: "A massive physical and mental gauntlet where Bane pushes Batman to his absolute breaking point." },
                    { id: "no-mans-land", title: "No Man's Land", priority: "Not Canon (per source)", universe: "Non-Canon", desc: "Has awesome moments and introduces Cassandra Cain as Batgirl. (Note: Marked as non-canon based on provided instructions)." },
                    { id: "tower-babel", title: "JLA: Tower of Babel", priority: "Canon", universe: "Canon", desc: "Highlights Batman's extreme contingency planning within the Justice League." },
                    { id: "hush", title: "Hush", priority: "Canon", universe: "Canon", desc: "A blockbuster mystery thriller touching upon almost his entire rogues gallery." },
                    { id: "war-games", title: "War Games", priority: "Not Canon (per source)", universe: "Non-Canon", desc: "A cool, massive gang war storyline." },
                    { id: "red-hood", title: "Under the Red Hood", priority: "Must-Read / Watch", universe: "Canon / Animated", desc: "A monumental story. The animated film adaptation is often considered superior to the comic inspiration." }
                ]
            },
            {
                phase: "Phase 5: The Grant Morrison Saga",
                items: [
                    { id: "birth-demon", title: "Birth of the Demon", priority: "Prequel", universe: "Canon", desc: "Crucial reading on Ra's and Talia Al Ghul. Essential relationship context before starting Morrison's run." },
                    { id: "morrison-start", title: "Grant Morrison's Run (Beginning)", priority: "Must-Read", universe: "Canon", desc: "Insanely weird, brilliantly layered saga that introduces Damian Wayne." },
                    { id: "final-crisis", title: "Final Crisis", priority: "Crucial Event", universe: "Canon", desc: "The massive DC event where the first major part of Morrison's run culminates." },
                    { id: "batman-robin", title: "Batman and Robin", priority: "Must-Read", universe: "Canon", desc: "A radically new dynamic for the duo in the fallout of Final Crisis." },
                    { id: "return-bruce", title: "Return of Bruce Wayne", priority: "Must-Read", universe: "Canon", desc: "Directly follows Batman and Robin." },
                    { id: "batman-inc", title: "Batman Incorporated", priority: "Must-Read", universe: "Canon", desc: "Batman takes his crusade global. This continues into the New 52 era." }
                ]
            },
            {
                phase: "Phase 6: New 52 & Rebirth",
                items: [
                    { id: "new-52", title: "Scott Snyder's New 52 Run", priority: "Must-Read", universe: "Canon", desc: "Runs in tandem with the end of Morrison's saga. Read both simultaneously to grasp the full picture." },
                    { id: "rebirth", title: "Rebirth Era", priority: "Exploration", universe: "Canon", desc: "The era following New 52. Explore side stories and characters that interest you!" }
                ]
            }
        ];

        // In-memory state
        let completedItems = new Set();
        let totalItems = 0;

        // Initialize Icons
        lucide.createIcons();

        // Helper function for Universe styling
        function getUniverseBadge(universe) {
            if (universe.includes('Canon') && !universe.includes('Non-Canon')) {
                return `<span class="inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-xs font-medium bg-yellow-500/10 text-yellow-500 border border-yellow-500/20"><i data-lucide="book" class="w-3 h-3"></i> Main Canon</span>`;
            } else if (universe.includes('Non-Canon')) {
                return `<span class="inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-500/10 text-red-400 border border-red-500/20"><i data-lucide="book-dashed" class="w-3 h-3"></i> Elseworlds / Non-Canon</span>`;
            } else if (universe.includes('Animated')) {
                return `<span class="inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-xs font-medium bg-blue-500/10 text-blue-400 border border-blue-500/20"><i data-lucide="tv" class="w-3 h-3"></i> Animated</span>`;
            }
            return `<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-slate-700 text-slate-300">${universe}</span>`;
        }

        // Helper function for Priority styling
        function getPriorityBadge(priority) {
            const isCritical = ['Must-Read', 'Unskippable', 'Crucial Event', 'Must-Read / Watch'].includes(priority);
            if (isCritical) {
                return `<span class="px-2.5 py-0.5 rounded text-xs font-bold bg-slate-800 text-white border border-slate-600 uppercase tracking-wider">${priority}</span>`;
            }
            return `<span class="px-2.5 py-0.5 rounded text-xs font-medium bg-slate-800/50 text-slate-400 border border-slate-700 uppercase tracking-wider">${priority}</span>`;
        }

        // Render the timeline
        function renderTimeline() {
            const container = document.getElementById('timeline-container');
            container.innerHTML = '';
            
            // Jednoduchá vertikálna os naľavo
            container.className = 'ml-4 md:ml-8 border-l-2 border-slate-700/80 pb-12';
            totalItems = 0;

            database.forEach((phaseData, phaseIndex) => {
                // Phase Header
                const phaseWrapper = document.createElement('div');
                phaseWrapper.className = 'relative mt-12 mb-6 first:mt-4';
                
                phaseWrapper.innerHTML = `
                    <div class="absolute -left-[1.35rem] -top-2 flex items-center justify-center w-10 h-10 rounded-full border-4 border-slate-900 bg-yellow-500 text-slate-900 font-bold shadow-lg z-20">
                        ${phaseIndex + 1}
                    </div>
                    <div class="pl-10 md:pl-12">
                        <h2 class="text-2xl font-bold text-slate-100">${phaseData.phase}</h2>
                    </div>
                `;
                container.appendChild(phaseWrapper);

                // Items in Phase
                phaseData.items.forEach((item, itemIndex) => {
                    totalItems++;
                    const itemCard = document.createElement('div');
                    const isCompleted = completedItems.has(item.id);
                    
                    itemCard.className = 'relative mb-6 group';
                    
                    itemCard.innerHTML = `
                        <!-- Timeline Dot -->
                        <div class="absolute -left-[0.70rem] top-6 w-5 h-5 rounded-full border-4 border-slate-900 bg-slate-600 group-hover:bg-yellow-500 transition-colors duration-300 z-10 ${isCompleted ? '!bg-green-500' : ''}"></div>
                        
                        <!-- Card Content -->
                        <div class="pl-10 md:pl-12">
                            <div id="card-${item.id}" class="p-5 rounded-xl border border-slate-700 bg-slate-800/80 shadow-md transition-all duration-200 cursor-pointer hover:-translate-y-1 hover:shadow-lg hover:border-yellow-500/50 ${isCompleted ? 'completed-card' : ''}" onclick="toggleStatus('${item.id}')">
                                
                                <div class="flex flex-col gap-3 mb-3">
                                    <div class="flex gap-2 flex-wrap">
                                        ${getUniverseBadge(item.universe)}
                                        ${getPriorityBadge(item.priority)}
                                    </div>
                                    <h3 id="title-${item.id}" class="text-xl font-bold text-white flex items-center gap-2 ${isCompleted ? 'completed-text' : ''}">
                                        ${item.title}
                                    </h3>
                                </div>
                                
                                <p id="desc-${item.id}" class="text-sm text-slate-400 leading-relaxed ${isCompleted ? 'completed-text' : ''}">
                                    ${item.desc}
                                </p>

                                <div class="mt-4 pt-4 border-t border-slate-700/50 flex items-center gap-2 text-sm font-medium ${isCompleted ? 'text-green-400' : 'text-slate-500'}">
                                    <div class="w-5 h-5 rounded border-2 flex items-center justify-center transition-colors ${isCompleted ? 'border-green-500 bg-green-500' : 'border-slate-500'}">
                                        ${isCompleted ? '<i data-lucide="check" class="w-3 h-3 text-slate-900 font-bold"></i>' : ''}
                                    </div>
                                    <span>${isCompleted ? 'Prečítané' : 'Označiť ako prečítané'}</span>
                                </div>
                            </div>
                        </div>
                    `;
                    container.appendChild(itemCard);
                });
            });

            document.getElementById('total-count').innerText = totalItems;
            lucide.createIcons();
        }

        // Handle clicking a card
        window.toggleStatus = function(id) {
            if (completedItems.has(id)) {
                completedItems.delete(id);
            } else {
                completedItems.add(id);
            }
            
            // Update counter
            document.getElementById('progress-count').innerText = completedItems.size;
            
            // Update specific card visually without full re-render for performance/smoothness
            const card = document.getElementById(`card-${id}`);
            const title = document.getElementById(`title-${id}`);
            const desc = document.getElementById(`desc-${id}`);
            
            if (completedItems.has(id)) {
                card.classList.add('completed-card');
                title.classList.add('completed-text');
                desc.classList.add('completed-text');
                
                // Update checkbox area
                const checkArea = card.querySelector('.mt-4');
                checkArea.className = checkArea.className.replace('text-slate-500', 'text-green-400');
                const box = checkArea.querySelector('div');
                box.className = box.className.replace('border-slate-500', 'border-green-500 bg-green-500');
                box.innerHTML = '<i data-lucide="check" class="w-3 h-3 text-slate-900 font-bold"></i>';
                checkArea.querySelector('span').innerText = 'Prečítané';
                
            } else {
                card.classList.remove('completed-card');
                title.classList.remove('completed-text');
                desc.classList.remove('completed-text');
                
                // Update checkbox area
                const checkArea = card.querySelector('.mt-4');
                checkArea.className = checkArea.className.replace('text-green-400', 'text-slate-500');
                const box = checkArea.querySelector('div');
                box.className = box.className.replace('border-green-500', 'border-slate-500').replace('bg-green-500', '');
                box.innerHTML = '';
                checkArea.querySelector('span').innerText = 'Označiť ako prečítané';
            }
            lucide.createIcons(); // Re-init icons for the newly injected checkmark
        };

        // Initial setup
        document.addEventListener('DOMContentLoaded', () => {
            renderTimeline();
            document.getElementById('progress-count').innerText = completedItems.size;
        });

    </script>
</body>
</html>
